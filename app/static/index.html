<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Subtitle</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      color: #fff;
    }
    .controls {
      margin-bottom: 1.5rem;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #0d9488;
      color: white;
    }
    button:hover { background: #0f766e; }
    button:disabled {
      background: #444;
      cursor: not-allowed;
    }
    button.stop { background: #dc2626; }
    button.stop:hover { background: #b91c1c; }
    .status {
      font-size: 0.875rem;
      color: #999;
      margin-top: 0.5rem;
    }
    .display {
      background: #252525;
      border-radius: 8px;
      padding: 1.25rem;
      min-height: 200px;
      border: 1px solid #333;
    }
    .partial {
      color: #888;
      font-size: 1rem;
      margin-bottom: 1rem;
      min-height: 1.5em;
    }
    .segments {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .segment {
      padding: 0.75rem;
      border-radius: 6px;
      border-left: 4px solid #0d9488;
    }
    .segment[data-speaker="speaker_1"] { border-left-color: #22d3ee; }
    .segment[data-speaker="speaker_2"] { border-left-color: #4ade80; }
    .segment[data-speaker="speaker_3"] { border-left-color: #facc15; }
    .segment[data-speaker="speaker_4"] { border-left-color: #d946ef; }
    .segment[data-speaker="speaker_5"] { border-left-color: #60a5fa; }
    .segment[data-speaker="speaker_6"] { border-left-color: #f87171; }
    .segment .speaker {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.25rem;
    }
    .segment .subtitle {
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    .segment .translation {
      font-size: 0.9rem;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>Phụ đề Realtime</h1>
  <div class="controls">
    <button id="btnStart">Bắt đầu</button>
    <button id="btnStop" class="stop" disabled>Dừng</button>
    <div class="status" id="status">Chưa kết nối</div>
  </div>
  <div class="display">
    <div class="partial" id="partial"></div>
    <div class="segments" id="segments"></div>
  </div>

  <script>
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const status = document.getElementById('status');
    const partial = document.getElementById('partial');
    const segments = document.getElementById('segments');

    let ws = null;

    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${location.host}/ws`;

    btnStart.onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        status.textContent = 'Đang nghe…';
        btnStart.disabled = true;
        btnStop.disabled = false;
      };
      ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === 'started') {
          status.textContent = 'Đang nghe… (session: ' + d.session_id + ')';
        } else if (d.type === 'partial') {
          partial.textContent = d.text || '';
        } else if (d.type === 'enriched') {
          const el = document.createElement('div');
          el.className = 'segment';
          el.dataset.speaker = d.speaker || 'unknown';
          const showTranslation = d.translation && d.translation.trim() !== (d.subtitle || '').trim();
          el.innerHTML = `
            <div class="speaker">${d.speaker || 'unknown'}</div>
            <div class="subtitle">${escapeHtml(d.subtitle || '')}</div>
            ${showTranslation ? `<div class="translation">${escapeHtml(d.translation)}</div>` : ''}
          `;
          segments.appendChild(el);
          partial.textContent = '';
          el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else if (d.type === 'error') {
          status.textContent = 'Lỗi: ' + (d.message || '');
        }
      };
      ws.onclose = () => {
        status.textContent = 'Đã dừng';
        btnStart.disabled = false;
        btnStop.disabled = true;
        ws = null;
      };
      ws.onerror = () => {
        status.textContent = 'Lỗi kết nối';
      };
    };

    btnStop.onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: 'stop' }));
        ws.close();
      }
    };

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
